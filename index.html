<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SohStx</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #e6e6e6;
    }

    /* HEADER WRAPPER WITH IMAGE */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      box-sizing: border-box;
      overflow: hidden;
    }

    /* HEADER BACKGROUND IMAGE */
    .header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("sohstxhead.jpg") center/cover no-repeat;
      filter: brightness(0.45);
      z-index: -1;
    }

    /* LOGO */
    .logo {
      font-weight: bold;
      letter-spacing: 2px;
      color: #00ffd5;
      z-index: 1;
    }

    /* NAV */
    nav {
      display: flex;
      gap: 18px;
      z-index: 1;
    }

    nav a {
      color: #e6e6e6;
      text-decoration: none;
      font-size: 14px;
      transition: 0.2s;
    }

    nav a:hover {
      color: #00ffd5;
    }

    /* MOBILE MENU */
    .menu-toggle {
      display: none;
      font-size: 22px;
      cursor: pointer;
      color: #e6e6e6;
      z-index: 1;
    }

    @media (max-width: 700px) {
      nav {
        display: none;
        position: absolute;
        top: 80px;
        right: 0;
        background: #111826;
        flex-direction: column;
        width: 200px;
        padding: 10px;
        border: 1px solid #222;
      }

      nav.show {
        display: flex;
      }

      .menu-toggle {
        display: block;
      }
    }

    /* PAGE CONTENT */
    .content {
      padding-top: 100px;
      padding-left: 20px;
      padding-right: 20px;
    }

    .hero {
      margin-top: 20px;
      padding: 40px;
      background: #121a2a;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header class="header">
  <div class="logo">SOHSTX</div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <nav id="nav">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<div class="content">

  <section id="home" class="hero">
    <h1>Welcome to SohStx</h1>
    <p>System architecture space for ideas, tools, and builds.</p>
  </section>

  <section id="about">
    <h2>About</h2>
    <p>This is where your story or concept goes.</p>
  </section>

  <section id="projects">
    <h2>Projects</h2>
    <p>Your builds, apps, experiments.</p>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <p>Links or form later.</p>
  </section>

</div>

<script>
  function toggleMenu() {
    const nav = document.getElementById("nav");
    nav.classList.toggle("show");
  }
</script>

</body>
</html>
